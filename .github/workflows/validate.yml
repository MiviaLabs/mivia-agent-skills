name: Validate

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  repository:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python tooling/validate_repository.py
      - run: python tooling/check_versions.py
      - run: python tooling/test_versions.py
      - run: python tooling/test_deep_bug_audit.py
      - run: python tooling/test_distribution.py
      - run: python tooling/test_project_bootstrap.py
      - run: python tooling/test_packaging.py
      - run: python scripts/package_claude_skills.py --output dist
      - if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: claude-skill-packages
          path: dist/*.zip

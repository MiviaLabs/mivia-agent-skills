- id: go_temp_file_leak
  meta:
    language: go
    polarity: bug
    mechanism: resource_missing_cleanup
    lineage: lin_tmp_leak_v1
    split: train
    trap: resource
    defect_class: resource_leak
    fingerprint: fp_7222ef47fb202e2b
    critical: false
    security_tenant: false
    mode: snippet
  vars:
    user: "Audit the following code for bugs (snippet mode).\n\n```go\nfunc ProcessFile(path string) error\
      \ {\n\tf, err := os.Open(path)\n\tif err != nil {\n\t\treturn err\n\t}\n\tdefer f.Close()\n\n\t\
      data, err := io.ReadAll(f)\n\tif err != nil {\n\t\treturn err\n\t}\n\n\ttmp, err := os.CreateTemp(\"\
      \", \"proc-*\")\n\tif err != nil {\n\t\treturn err\n\t}\n\tif _, err := tmp.Write(data); err !=\
      \ nil {\n\t\treturn err\n\t}\n\ttmp.Close()\n\treturn nil\n}\n```\n"
  assertions:
  - type: bug_audit_oracle
    id: hidden_oracle
    hard: true
    required: true

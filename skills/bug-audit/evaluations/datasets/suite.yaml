      balance = 100
      approved = [False, False]
      checked = threading.Barrier(2)

      def withdraw(index: int, amount: int) -> None:
          global balance
          if balance >= amount:
              observed = balance
              checked.wait()
              balance = observed - amount
              approved[index] = True


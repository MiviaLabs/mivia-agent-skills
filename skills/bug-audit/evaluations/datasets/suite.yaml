          public Claims verify(String token) {
              String[] parts = token.split("\\.");
              JsonObject header = Json.parse(base64Url(parts[0])).asObject();
              String alg = header.getString("alg", "none");
              byte[] payload = base64UrlBytes(parts[1]);
              if ("none".equalsIgnoreCase(alg)) {
                  return Claims.parse(payload); // accepts unsigned
              }
              byte[] sig = base64UrlBytes(parts[2]);

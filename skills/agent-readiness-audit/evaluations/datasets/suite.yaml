    defect_class: uninstalled_hook
    fingerprint: fp_69f7690a6bb4a5d6
    critical: true
    security_tenant: false
    mode: bundle
  vars:
    user: |
      Audit the following control-plane bundle for the bounded question
      below. Use the bounded output contract only.

      === .githooks/pre-commit ===
      #!/usr/bin/env bash
      set -euo pipefail
      if git diff --cached --name-only | grep -q '^secrets/'; then
        echo 'refusing secrets/' >&2
        exit 1
      fi


      === repository notes ===
      `git config --get core.hooksPath` returns empty, so Git uses
      `.git/hooks` by default, which does not contain the script above.
      The hook file under `.githooks/` is not installed for contributors.

      Bounded question: May an agent commit a file under secrets/?
  assertions:
  - type: agent_readiness_oracle
    id: hidden_oracle
    hard: true
